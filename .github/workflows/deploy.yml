name: Deploy to production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL || 'https://genesislearningacademyofkennesaw.com/gallery' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Validate build output
        run: |
          set -euo pipefail
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html not found after build"
            exit 1
          fi
          echo "Build validated: dist/index.html exists"

      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          missing=()
          [ -z "${DEPLOY_HOST}" ] && missing+=("DEPLOY_HOST")
          [ -z "${DEPLOY_USER}" ] && missing+=("DEPLOY_USER")
          [ -z "${DEPLOY_SSH_KEY}" ] && missing+=("DEPLOY_SSH_KEY")
          [ -z "${DEPLOY_PATH}" ] && missing+=("DEPLOY_PATH")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Normalize literal \n sequences and CRLF line endings from secret paste formats.
          printf '%s' "${DEPLOY_SSH_KEY}" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY is invalid or malformed"
            exit 1
          fi
          echo "SSH key validated successfully"

      - name: Add host to known_hosts
        run: |
          set -euo pipefail
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          set -euo pipefail
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o BatchMode=yes -o IdentitiesOnly=yes" \
            dist/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"

      - name: Post-deploy health check
        run: |
          set -euo pipefail

          BUILD_FINGERPRINT="$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1 || true)"
          if [ -z "${BUILD_FINGERPRINT}" ]; then
            echo "::error::Could not extract build fingerprint from dist/index.html"
            exit 1
          fi
          echo "Expected build fingerprint: ${BUILD_FINGERPRINT}"
          echo "Checking ${DEPLOY_HEALTH_URL}"

          for attempt in 1 2 3 4 5; do
            echo "Health check attempt ${attempt}/5..."
            sleep $((attempt * 2))

            if response="$(curl -fsSL "${DEPLOY_HEALTH_URL}" 2>/dev/null)" && \
               printf '%s' "${response}" | grep -qF "${BUILD_FINGERPRINT}"; then
              echo "Health check passed: live site reflects the current build."
              exit 0
            fi
          done

          echo "::warning::Health check failed: ${DEPLOY_HEALTH_URL} does not appear to serve ${BUILD_FINGERPRINT}."
          echo "::warning::The deployment may be stale, cached, or still propagating."
          exit 1
